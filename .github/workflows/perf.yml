name: Perf

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

env:
  TERM: xterm-256color

jobs:
  perf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # setup-go v6 reads go.mod's toolchain directive, keeping perf checks on the patched Go 1.26 toolchain.
          go-version-file: go.mod
          cache: true

      - name: Run harness presets + compare baselines
        run: scripts/perf_compare.sh
        env:
          # Shared ubuntu-latest runners show large run-to-run variance (a 55%
          # p95 swing was observed across three runs within six minutes), so
          # the CI tolerance is much looser than the 10% local default; the
          # darwin dev-machine gate stays tight.
          PERF_TOLERANCE: '0.50'
          PERF_STRICT: '1'
          HARNESS_FRAMES: '300'
          HARNESS_WARMUP: '30'
          HARNESS_SCROLLBACK_FRAMES: '600'

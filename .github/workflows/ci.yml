name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  TERM: xterm-256color
  GOVULNCHECK_VERSION: v1.1.4

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve golangci-lint version
        id: golangci_version
        run: echo "version=$(cat .golangci-version)" >> "$GITHUB_OUTPUT"

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: ${{ steps.golangci_version.outputs.version }}
          install-mode: goinstall
          verify: false
          args: --timeout=10m

      - name: File length guard (max 500 lines)
        run: |
          set -euo pipefail
          find . -name '*.go' -exec wc -l {} + | awk '!/total$/ && $1 > 500 { print "ERROR: " $2 " has " $1 " lines (max 500)"; found=1 } END { if(found) exit 1 }'

      - name: Vet
        run: go vet ./...

      - name: Windows cross-compile
        run: GOOS=windows GOARCH=amd64 go build ./...

      - name: Tidy check
        run: |
          set -euo pipefail
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Test
        run: |
          set -euo pipefail
          pkgs=$(go list ./... | grep -v '/internal/e2e$' | grep -v '/internal/tmux$')
          if [ -z "$pkgs" ]; then
            echo "no packages selected for unit tests"
            exit 1
          fi
          go test $pkgs

      - name: Test (race)
        run: |
          set -euo pipefail
          pkgs=$(go list ./... | grep -v '/internal/e2e$' | grep -v '/internal/tmux$')
          if [ -z "$pkgs" ]; then
            echo "no packages selected for race tests"
            exit 1
          fi
          go test -race $pkgs

      - name: Govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION} ./...

      - name: Harness (center)
        run: go run ./cmd/amux-harness -mode center -frames 5 -warmup 1 -tabs 8 -width 160 -height 48 -hot-tabs 2 -payload-bytes 64 -newline-every 4

      - name: Harness (sidebar)
        run: go run ./cmd/amux-harness -mode sidebar -frames 5 -warmup 1 -tabs 8 -width 160 -height 48 -hot-tabs 2 -payload-bytes 64 -newline-every 4

      - name: Harness (monitor)
        run: go run ./cmd/amux-harness -mode monitor -frames 5 -warmup 1 -tabs 8 -width 160 -height 48 -hot-tabs 2 -payload-bytes 64 -newline-every 4

  tmux-e2e:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: tmux version
        run: tmux -V

      - name: Test (tmux)
        run: go test ./internal/tmux -count=1

      - name: Test (e2e)
        run: go test ./internal/e2e -count=1

  lint-strict-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve golangci-lint version
        id: golangci_version
        run: echo "version=$(cat .golangci-version)" >> "$GITHUB_OUTPUT"

      - name: Strict lint (changed code only)
        uses: golangci/golangci-lint-action@v6
        with:
          version: ${{ steps.golangci_version.outputs.version }}
          install-mode: goinstall
          verify: false
          args: --config=.golangci.strict.yml --enable=funlen --enable=gocyclo --enable=nestif --new-from-rev=${{ github.event.pull_request.base.sha }} --timeout=10m

  macos-build:
    # Minimal darwin coverage on push to main only (macOS minutes are ~10x
    # linux). Proves the released darwin binary compiles and exercises the
    # darwin-only pbcopy path in internal/ui/common. Race/lint/govulncheck/
    # harness are host-independent and already run on linux.
    if: github.event_name == 'push'
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Test
        run: |
          set -euo pipefail
          pkgs=$(go list ./... | grep -v '/internal/e2e$' | grep -v '/internal/tmux$')
          go test $pkgs

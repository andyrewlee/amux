name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  TERM: xterm-256color
  GOVULNCHECK_VERSION: v1.1.4

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve golangci-lint version
        id: golangci_version
        run: echo "version=$(cat .golangci-version)" >> "$GITHUB_OUTPUT"

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ steps.golangci_version.outputs.version }}
          install-mode: goinstall
          install-only: true
          verify: false

      - name: Lint
        run: golangci-lint run --timeout=10m

      - name: Format check
        run: golangci-lint fmt --diff

      - name: File length guard (max 500 lines)
        run: |
          set -euo pipefail
          find . -name '*.go' -exec wc -l {} + | awk '!/total$/ && $1 > 500 { print "ERROR: " $2 " has " $1 " lines (max 500)"; found=1 } END { if(found) exit 1 }'

      - name: Vet
        run: go vet ./...

      - name: Windows cross-compile
        run: GOOS=windows GOARCH=amd64 go build ./...

      - name: Tidy check
        run: |
          set -euo pipefail
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Test
        run: |
          set -euo pipefail
          pkgs=$(go list ./... | grep -v '/internal/e2e$' | grep -v '/internal/tmux$')
          if [ -z "$pkgs" ]; then
            echo "no packages selected for unit tests"
            exit 1
          fi
          go test $pkgs

      - name: Test (race)
        run: |
          set -euo pipefail
          pkgs=$(go list ./... | grep -v '/internal/e2e$' | grep -v '/internal/tmux$')
          if [ -z "$pkgs" ]; then
            echo "no packages selected for race tests"
            exit 1
          fi
          go test -race $pkgs

      - name: Govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION} ./...

      - name: Harness (center)
        run: go run ./cmd/amux-harness -mode center -frames 5 -warmup 1 -tabs 8 -width 160 -height 48 -hot-tabs 2 -payload-bytes 64 -newline-every 4 -assert-min-visible 100

      - name: Harness (sidebar)
        run: go run ./cmd/amux-harness -mode sidebar -frames 5 -warmup 1 -tabs 8 -width 160 -height 48 -hot-tabs 2 -payload-bytes 64 -newline-every 4 -assert-min-visible 100

      - name: Harness (monitor)
        run: go run ./cmd/amux-harness -mode monitor -frames 5 -warmup 1 -tabs 8 -width 160 -height 48 -hot-tabs 2 -payload-bytes 64 -newline-every 4 -assert-min-visible 100

  tmux-e2e:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        # Bug #1 (tmux 3.6a rejecting '='-prefixed set-option targets) is version
        # specific, yet CI only ran ubuntu's apt tmux (3.2a-class) — OLDER than the
        # version that produced the bug, so a 3.6a-only regression passed. Run the
        # real-tmux suites against both the apt baseline and a from-source 3.6a so
        # version-specific regressions fail on the leg that can see them.
        tmux: [apt, "3.6a"]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install tmux (${{ matrix.tmux }})
        run: |
          set -euo pipefail
          if [ "${{ matrix.tmux }}" = "apt" ]; then
            sudo apt-get update && sudo apt-get install -y tmux
          else
            sudo apt-get update
            sudo apt-get install -y build-essential libevent-dev libncurses-dev bison pkg-config
            ver="${{ matrix.tmux }}"
            curl -fsSL "https://github.com/tmux/tmux/releases/download/${ver}/tmux-${ver}.tar.gz" -o /tmp/tmux.tar.gz
            tar -xzf /tmp/tmux.tar.gz -C /tmp
            cd "/tmp/tmux-${ver}"
            ./configure
            make -j"$(nproc)"
            sudo make install
            sudo ldconfig
          fi

      - name: tmux version
        run: |
          set -euo pipefail
          tmux -V
          if [ "${{ matrix.tmux }}" != "apt" ]; then
            tmux -V | grep -Fq "${{ matrix.tmux }}" || { echo "expected tmux ${{ matrix.tmux }} but got: $(tmux -V)"; exit 1; }
          fi

      - name: Test (tmux)
        run: go test ./internal/tmux -count=1

      - name: Test (e2e)
        run: go test ./internal/e2e -count=1

      # internal/app has real-tmux integration tests (dead-session GC, activity
      # leases, shared-attach) that t.Skip in the tmux-less `test` job and were
      # never run here, so app-layer tmux orchestration only got coverage in the
      # off-PR nightly run. Run them here, where tmux is installed.
      - name: Test (app, real tmux)
        run: go test ./internal/app -count=1

      - name: Assert no real-tmux tests skipped
        run: STRICT_TMUX=1 make tmux-skip-check

  lint-strict-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve golangci-lint version
        id: golangci_version
        run: echo "version=$(cat .golangci-version)" >> "$GITHUB_OUTPUT"

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ steps.golangci_version.outputs.version }}
          install-mode: goinstall
          install-only: true
          verify: false

      - name: Strict lint (changed code only)
        run: golangci-lint run --config=.golangci.strict.yml --enable=funlen --enable=gocyclo --enable=nestif --new-from-rev=${{ github.event.pull_request.base.sha }} --timeout=10m

      - name: Strict format check
        run: golangci-lint fmt --config=.golangci.strict.yml --diff

  macos-build:
    # Minimal darwin coverage on push to main only (macOS minutes are ~10x
    # linux). Proves the released darwin binary compiles and exercises the
    # darwin-only pbcopy path in internal/ui/common. Race/lint/govulncheck/
    # harness are host-independent and already run on linux.
    if: github.event_name == 'push'
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Test
        run: |
          set -euo pipefail
          pkgs=$(go list ./... | grep -v '/internal/e2e$' | grep -v '/internal/tmux$')
          go test $pkgs

version: "2"
run:
  modules-download-mode: readonly
  tests: true
linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - depguard
    - errcheck
    - errorlint
    - forbidigo
    - govet
    - ineffassign
    - misspell
    - nolintlint
    - staticcheck
    - thelper
    - unconvert
    - unused
    - usestdlibvars
    - whitespace
  settings:
    depguard:
      rules:
        main:
          list-mode: lax
          deny:
            - pkg: github.com/pkg/errors
              desc: Use standard library errors/fmt wrapping instead.
            - pkg: io/ioutil
              desc: Use os or io packages instead of io/ioutil.
    errcheck:
      check-type-assertions: true
    errorlint:
      errorf: true
      asserts: false
      comparison: false
    forbidigo:
      forbid:
        - pattern: ^print(ln)?$
          msg: Avoid direct stdout/stderr prints in production code.
        - pattern: ^fmt\.Print.*$
          msg: Use internal/logging for internal packages; stdout/stderr output is reserved for CLI entrypoints.
        - pattern: ^log\.(Print|Printf|Println|Fatal|Fatalf|Fatalln|Panic|Panicf|Panicln)$
          msg: Use internal/logging and explicit error returns instead of stdlib log side effects.
      exclude-godoc-examples: true
      analyze-types: true
    govet:
      enable:
        - nilness
        - reflectvaluecompare
        - sortslice
        - unusedwrite
    misspell:
      locale: US
    nolintlint:
      require-explanation: true
      require-specific: true
    staticcheck:
      checks:
        - all
        - -ST1000
        - -ST1003
        - -ST1016
        - -ST1020
        - -ST1021
        - -ST1022
        - -QF*
    thelper:
      test:
        begin: false
      fuzz:
        begin: false
      benchmark:
        begin: false
      tb:
        begin: false
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - forbidigo
        path: ^cmd/
      - linters:
          - forbidigo
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
  settings:
    gofumpt:
      extra-rules: true
    goimports:
      local-prefixes:
        - github.com/andyrewlee/amux
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
